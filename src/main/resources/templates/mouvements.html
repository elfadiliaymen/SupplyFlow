<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Liste des Mouvements</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Produit</th>
        <th>type</th>
        <th>quanity</th>
        <th>date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${Mouvements}">
        <td th:text="${m.id}"></td>
        <td th:text="${m.produit.designation}"></td>
        <td th:text="${m.type}"></td>
        <td th:text="${m.quanity}"></td>
        <td th:text="${m.date}"></td>
    </tr>
    </tbody>
</table>
<br/>
<a th:href = "@{/mouvements/ajouter}">Ajouter une mouvement</a>
<a th:href="@{/}">Retour à l'accueil</a>

</body>
</html>

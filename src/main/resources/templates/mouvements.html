<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique des Mouvements - SupplyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-8 bg-base-200 min-h-screen">
    <div class="max-w-5xl mx-auto card bg-base-100 shadow-sm p-6 border border-base-300">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Historique des Mouvements</h1>
            <a th:href="@{/mouvements/ajouter}" class="btn btn-primary btn-sm">Ajouter un mouvement</a>
        </div>

        <div class="overflow-x-auto">
            <table class="table table-sm w-full">
                <thead>
                    <tr class="bg-base-200">
                        <th>ID</th>
                        <th>Produit</th>
                        <th>Type</th>
                        <th>Quantité</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${Mouvements}" class="hover:bg-base-50">
                        <td th:text="${m.id}" class="text-base-content/50"></td>
                        <td th:text="${m.produit.designation}" class="font-medium"></td>
                        <td>
                            <span th:text="${m.type}" class="badge badge-sm badge-ghost border-base-300"></span>
                        </td>
                        <td th:text="${m.quanity}" class="font-mono"></td>
                        <td th:text="${m.date}" class="text-base-content/70"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 pt-4 border-t border-base-200 flex justify-end gap-4 text-sm">
            <a th:href="@{/}" class="link link-hover text-primary">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>

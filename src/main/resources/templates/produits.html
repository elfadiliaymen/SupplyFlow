<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Produits - SupplyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-8 bg-base-200 min-h-screen">
    <div class="max-w-6xl mx-auto card bg-base-100 shadow-sm p-6 border border-base-300">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Liste des Produits</h1>
            <a th:href="@{/produits/ajouter}" class="btn btn-primary btn-sm">Ajouter un produit</a>
        </div>
        
        <form th:action="@{/produits/recherche}" method="GET" class="flex gap-2 mb-6">
            <input type="text" name="designation" th:value="${recherche}" placeholder="Rechercher par désignation..." class="input input-bordered w-full max-w-xs input-sm">
            <button type="submit" class="btn btn-neutral btn-sm">Rechercher</button>
        </form>

        <div class="overflow-x-auto">
            <table class="table table-sm w-full">
                <thead>
                    <tr class="bg-base-200">
                        <th>ID</th>
                        <th>Désignation</th>
                        <th>Catégorie</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th>Fournisseur</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${Produits}" class="hover:bg-base-50">
                        <td th:text="${p.id}" class="text-base-content/50"></td>
                        <td th:text="${p.designation}" class="font-medium"></td>
                        <td th:text="${p.categorie}"></td>
                        <td th:text="${p.prix + ' €'}"></td>
                        <td>
                            <span th:text="${p.stock}" class="badge badge-sm badge-ghost border-base-300 font-mono"></span>
                        </td>
                        <td th:text="${p.fournisseur != null ? p.fournisseur.name : '-'}"></td>
                        <td class="flex justify-end gap-2">
                            <a th:href="@{'/produits/modifier/' + ${p.id}}" class="btn btn-xs btn-ghost border-base-300">Modifier</a>
                            <a th:href="@{'/produits/delete/' + ${p.id}}" class="btn btn-xs btn-error btn-outline" onclick="return confirm('Supprimer ce produit ?')">Supprimer</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 pt-4 border-t border-base-200 flex justify-between items-center text-sm">
            <span class="text-base-content/60">Total : <span class="font-bold" th:text="${Produits.size()}"></span> produits</span>
            <a th:href="@{/}" class="link link-hover text-primary">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>

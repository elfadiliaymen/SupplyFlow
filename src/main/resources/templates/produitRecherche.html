<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultats de Recherche - SupplyFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-8 bg-base-200 min-h-screen">
    <div class="max-w-5xl mx-auto card bg-base-100 shadow-sm p-6 border border-base-300">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Résultats de la Recherche</h1>
            <a th:href="@{/produits/ajouter}" class="btn btn-primary btn-sm">Ajouter un produit</a>
        </div>

        <div class="overflow-x-auto">
            <table class="table table-sm w-full">
                <thead>
                    <tr class="bg-base-200">
                        <th>ID</th>
                        <th>Désignation</th>
                        <th>Prix</th>
                        <th>Stock</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${Produit}" class="hover:bg-base-50">
                        <td th:text="${p.id}" class="text-base-content/50"></td>
                        <td th:text="${p.designation}" class="font-medium"></td>
                        <td th:text="${p.prix + ' €'}"></td>
                        <td>
                            <span th:text="${p.stock}" class="badge badge-sm badge-ghost border-base-300 font-mono"></span>
                        </td>
                        <td class="flex justify-end gap-2">
                            <a th:href="@{'/produits/modifier/' + ${p.id}}" class="btn btn-xs btn-ghost border-base-300">Modifier</a>
                            <a th:href="@{'/produits/delete/' + ${p.id}}" class="btn btn-xs btn-error btn-outline" onclick="return confirm('Supprimer ce produit ?')">Supprimer</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 pt-4 border-t border-base-200 flex justify-end gap-4 text-sm">
            <a th:href="@{/produits}" class="link link-hover">Retour à la liste</a>
            <a th:href="@{/}" class="link link-hover text-primary">Accueil</a>
        </div>
    </div>
</body>
</html>

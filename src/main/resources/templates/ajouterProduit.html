<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Ajouter un Produit</h1>

<form th:action="@{/produits/ajouter}" th:object="${Produit}"  method="Post">
    <div>
        <label>Désignation :</label>
        <input type="text" th:field="*{designation}">
    </div>
    <div>
        <label>Prix :</label>
        <input type="number" step="0.01" th:field="*{prix}">
    </div>
    <div>
        <label>Stock :</label>
        <input type="number" th:field="*{stock}">
    </div>
    <button type="submit">Enregistrer</button>
</form>

<br>
<a th:href="@{/produits}">Annuler et retourner à la liste</a>

</body>
</html>
